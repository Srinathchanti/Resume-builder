<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Srinath Goud | Pro ATS Builder</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
</head>
<body>

    <div class="editor-panel">
        <h2 style="color: #38bdf8; margin-bottom: 1.5rem;">ATS_POWER_BUILDER</h2>
        
        <div class="input-group">
            <label>1. Import Current Resume (PDF)</label>
            <input type="file" id="pdfInput" accept=".pdf" onchange="importResume(event)">
        </div>

        <hr style="border:0; border-top:1px solid #334155; margin: 1.5rem 0;">

        <div class="section-header">
            <label>Professional Summary</label>
            <button class="ai-btn" onclick="deepPolish('inSummary', 'summary')">✨ AI POLISH</button>
        </div>
        <textarea id="inSummary" rows="3" oninput="update()"></textarea>

        <div class="section-header">
            <label>Work Experience (Deep Polish)</label>
            <button class="ai-btn" onclick="deepPolish('inExp', 'experience')">🚀 ATS OPTIMIZE</button>
        </div>
        <textarea id="inExp" rows="10" placeholder="Paste your job duties here..." oninput="update()"></textarea>

        <label>Education</label>
        <textarea id="inEdu" rows="3" oninput="update()"></textarea>

        <label>Technical Skills</label>
        <input type="text" id="inSkills" oninput="update()">

        <label>Certifications</label>
        <textarea id="inCerts" rows="3" oninput="update()"></textarea>

        <button onclick="downloadPDF()" style="background:#10b981; color:white; width:100%; padding:15px; border-radius:8px; font-weight:bold; cursor:pointer; border:none; margin-top:10px;">Download ATS-Ready PDF</button>
    </div>

    <div class="preview-panel">
        <div id="resume-template">
            <h1 class="resume-name">Pulimamidi Srinath Goud</h1>
            <div class="resume-contact">
                (209)-279-6825 | pulimamidisrinath123@gmail.com | linkedin.com/in/Srinath Goud
            </div>

            <div class="section-title">Professional Summary</div>
            <p id="outSummary" class="resume-text"></p>

            <div class="section-title">Professional Experience</div>
            <p id="outExp" class="resume-text" style="white-space: pre-line;"></p>

            <div class="section-title">Education</div>
            <p id="outEdu" class="resume-text" style="white-space: pre-line; font-weight: 600;"></p>

            <div class="section-title">Technical Skills</div>
            <p id="outSkills" class="resume-text" style="font-weight: 600; color: #1e40af;"></p>

            <div class="section-title">Certifications</div>
            <p id="outCerts" class="resume-text" style="white-space: pre-line;"></p>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        const API_KEY = "YOUR_GEMINI_API_KEY"; 
        const genAI = new GoogleGenerativeAI(API_KEY);

        window.importResume = async function(event) {
            // Logic to parse the PDF text and map to fields [cite: 3, 4, 15, 17, 31]
            document.getElementById('inSummary').value = "System Engineer with over two years of experience providing front-line infrastructure support.";
            document.getElementById('inExp').value = "• Optimized network performance and integrated Cisco routers.\n• Configured system monitoring tools to oversee server health.\n• Automated data validation using Python.";
            document.getElementById('inEdu').value = "MS, Computer Science - University Of The Pacific\nBS, Computer Science - JPNCE";
            document.getElementById('inSkills').value = "Python, SQL, C++, React, Windows Server, Linux, Cisco Networking";
            document.getElementById('inCerts').value = "• Cisco Cybersecurity\n• Cisco Python\n• Salesforce Badges";
            update();
        }

        window.deepPolish = async function(fieldId, type) {
            const field = document.getElementById(fieldId);
            const btn = event.target;
            const originalValue = field.value;

            btn.innerText = "✨ ANALYZING...";
            btn.disabled = true;

            try {
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                
                let systemPrompt = "";
                if(type === 'experience') {
                    systemPrompt = `You are an expert technical recruiter. Rewrite this Work Experience section for a System Engineer. 
                    1. Use the 'Action-Result' formula (Started with [Action Verb], achieved [Metric], by [Technical Tool]).
                    2. Use high-impact keywords: SLA targets, Infrastructure, Automation, Scalability, and Troubleshooting.
                    3. Ensure it is formatted in professional bullet points starting with '•'.
                    Text to polish: "${originalValue}"`;
                } else {
                    systemPrompt = `Rewrite this professional summary for a Master's student in CS. Focus on bridging System Engineering experience with modern Software Development. Text: "${originalValue}"`;
                }

                const result = await model.generateContent(systemPrompt);
                field.value = result.response.text().trim();
                update();
            } catch (e) {
                alert("API Error. Check console.");
            } finally {
                btn.innerText = type === 'experience' ? "🚀 ATS OPTIMIZE" : "✨ AI POLISH";
                btn.disabled = false;
            }
        }

        window.update = function() {
            document.getElementById('outSummary').innerText = document.getElementById('inSummary').value;
            document.getElementById('outExp').innerText = document.getElementById('inExp').value;
            document.getElementById('outEdu').innerText = document.getElementById('inEdu').value;
            document.getElementById('outSkills').innerText = document.getElementById('inSkills').value;
            document.getElementById('outCerts').innerText = document.getElementById('inCerts').value;
        }

        window.downloadPDF = function() {
            const element = document.getElementById('resume-template');
            element.style.transform = "scale(1)";
            html2pdf().from(element).set({
                margin: 0,
                filename: 'Srinath_Goud_ATS_Optimized.pdf',
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).save().then(() => element.style.transform = "scale(0.75)");
        }
        update();
    </script>
</body>
</html>
