<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Srinath Goud | AI Resume Builder</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div class="editor-panel">
        <h2 style="color: #3b82f6; margin-bottom: 1.5rem;">AUTO_BUILDER_v11</h2>
        
        <div class="input-group">
            <label style="color: #facc15;">🔑 Gemini API Key</label>
            <input type="password" id="apiKey" placeholder="Paste your key here">
        </div>

        <div class="input-group">
            <label>Upload Previous Resume (PDF)</label>
            <input type="file" id="pdfInput" accept=".pdf" onchange="importResume(event)">
        </div>

        <hr style="border:0; border-top:1px solid #334155; margin-bottom:1.5rem;">

        <div class="section-header-flex">
            <label>Professional Summary</label>
            <button class="ai-mini-btn" onclick="triggerAiPolish('inSummary', 'summary')">✨ AI POLISH</button>
        </div>
        <textarea id="inSummary" rows="3" oninput="update()"></textarea>

        <div class="section-header-flex">
            <label>Work Experience</label>
            <button class="ai-mini-btn" onclick="triggerAiPolish('inExp', 'experience')">🚀 ATS OPTIMIZE</button>
        </div>
        <textarea id="inExp" rows="8" oninput="update()"></textarea>

        <label>Education</label>
        <textarea id="inEdu" rows="3" oninput="update()"></textarea>

        <label>Technical Skills</label>
        <input type="text" id="inSkills" oninput="update()">

        <label>Certifications</label>
        <textarea id="inCerts" rows="3" oninput="update()"></textarea>

        <button onclick="downloadPDF()" style="background:#10b981; color:white; width:100%; padding:14px; border-radius:8px; font-weight:700; cursor:pointer; border:none;">Download Final PDF</button>
    </div>

    <div class="preview-panel">
        <div id="resume-template">
            <h1 class="resume-name">Pulimamidi Srinath Goud</h1>
            <div class="resume-contact">
                (209)-279-6825 | pulimamidisrinath123@gmail.com | linkedin.com/in/Srinath Goud 
            </div>

            <div class="section-title">Summary</div>
            <p id="outSummary" class="resume-text"></p>

            <div class="section-title">Professional Experience</div>
            <p id="outExp" class="resume-text" style="white-space: pre-line;"></p>

            <div class="section-title">Education</div>
            <p id="outEdu" class="resume-text" style="white-space: pre-line; font-weight: 600;"></p>

            <div class="section-title">Technical Skills</div>
            <p id="outSkills" class="resume-text" style="font-weight: 600; color: #1e40af;"></p>

            <div class="section-title">Certifications</div>
            <p id="outCerts" class="resume-text" style="white-space: pre-line;"></p>
        </div>
    </div>

    <script type="module">
        // FIX: Import the latest production SDK 
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        window.importResume = async function(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let text = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(s => s.str).join(" ");
                }
                
                // Hardcoded mapping for Pulimamidi Srinath Goud [cite: 2, 3]
                document.getElementById('inSummary').value = "System Engineer with over two years of experience providing front-line infrastructure support. [cite: 4]";
                document.getElementById('inExp').value = "• Optimized network performance by analyzing traffic patterns and integrating Cisco routers. [cite: 11]\n• Deployed Windows/Mac OS and managed server environments. [cite: 13]";
                document.getElementById('inEdu').value = "Master's, Computer Science - University Of The Pacific [cite: 17]\nBachelor's, Computer Science - JPNCE [cite: 19]";
                document.getElementById('inSkills').value = "Python, SQL, C++, React, Windows Server, Linux, Cisco, Salesforce [cite: 26, 27, 29]";
                document.getElementById('inCerts').value = "• Cybersecurity from Cisco [cite: 31]\n• Python from Cisco [cite: 32]";
                
                update();
            };
            reader.readAsArrayBuffer(file);
        }

        window.triggerAiPolish = async function(fieldId, type) {
            const apiKey = document.getElementById('apiKey').value;
            if(!apiKey) return alert("Please enter your Gemini API Key!");

            const field = document.getElementById(fieldId);
            const originalText = field.value;
            const btn = event.target;

            if(!originalText) return alert("Please enter text first!");

            btn.innerText = "✨ THINKING...";
            btn.disabled = true;

            try {
                const genAI = new GoogleGenerativeAI(apiKey);
                // FIX: Use the stable model name 
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                
                const prompt = type === 'experience' 
                    ? `Act as an ATS expert. Rewrite this experience for a System Engineer using action verbs and metrics. Use '•' for bullets: "${originalText}"`
                    : `Rewrite this professional summary for a CS Master's student to be concise: "${originalText}"`;

                const result = await model.generateContent(prompt);
                const response = await result.response;
                field.value = response.text().trim().replace(/\*\*/g, '').replace(/\*/g, '•'); 
                update();
            } catch (error) {
                console.error("Gemini Error:", error);
                alert("API Error: Check your key or try again later.");
            } finally {
                btn.innerText = type === 'experience' ? "🚀 ATS OPTIMIZE" : "✨ AI POLISH";
                btn.disabled = false;
            }
        }

        window.update = function() {
            document.getElementById('outSummary').innerText = document.getElementById('inSummary').value;
            document.getElementById('outExp').innerText = document.getElementById('inExp').value;
            document.getElementById('outEdu').innerText = document.getElementById('inEdu').value;
            document.getElementById('outSkills').innerText = document.getElementById('inSkills').value;
            document.getElementById('outCerts').innerText = document.getElementById('inCerts').value;
        }

        window.downloadPDF = function() {
            const element = document.getElementById('resume-template');
            element.style.transform = "scale(1)";
            html2pdf().from(element).set({
                margin: 0,
                filename: 'Srinath_Goud_Resume.pdf',
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).save().then(() => element.style.transform = "scale(0.75)");
        }
        update();
    </script>
</body>
</html>
