<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Srinath Goud | Manual Resume Builder</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div class="editor-panel">
        <h2 style="color: #3b82f6; margin-bottom: 1.5rem;">STATIC_BUILDER_v13</h2>
        
        <div class="input-group">
            <label>Import Previous Resume (PDF)</label>
            <input type="file" id="pdfInput" accept=".pdf" onchange="importResume(event)">
        </div>

        <hr style="border:0; border-top:1px solid #334155; margin-bottom:1.5rem;">

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="inName" value="Pulimamidi Srinath Goud" oninput="update()">
        </div>

        <div class="input-group">
            <label>Professional Summary</label>
            <textarea id="inSummary" rows="3" oninput="update()"></textarea>
        </div>

        <div class="input-group">
            <label>Work Experience</label>
            <textarea id="inExp" rows="8" oninput="update()"></textarea>
        </div>

        <div class="input-group">
            <label>Education</label>
            <textarea id="inEdu" rows="3" oninput="update()"></textarea>
        </div>

        <div class="input-group">
            <label>Technical Skills</label>
            <input type="text" id="inSkills" oninput="update()">
        </div>

        <div class="input-group">
            <label>Certifications</label>
            <textarea id="inCerts" rows="3" oninput="update()"></textarea>
        </div>

        <button onclick="downloadPDF()" class="download-btn">Download Final PDF</button>
    </div>

    <div class="preview-panel">
        <div id="resume-template">
            <h1 class="resume-name" id="outName">Srinath Goud</h1>
            <div class="resume-contact">
                (209)-279-6825 | pulimamidisrinath123@gmail.com | linkedin.com/in/Srinath Goud
            </div>

            <div class="section-title">Summary</div>
            <p id="outSummary" class="resume-text"></p>

            <div class="section-title">Professional Experience</div>
            <p id="outExp" class="resume-text" style="white-space: pre-line;"></p>

            <div class="section-title">Education</div>
            <p id="outEdu" class="resume-text" style="white-space: pre-line; font-weight: 600;"></p>

            <div class="section-title">Technical Skills</div>
            <p id="outSkills" class="resume-text" style="font-weight: 600; color: #1e40af;"></p>

            <div class="section-title">Certifications</div>
            <p id="outCerts" class="resume-text" style="white-space: pre-line;"></p>
        </div>
    </div>

    <script>
        // PDF.js worker setup
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // 1. Static Import Logic (No API Required)
        async function importResume(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let text = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(s => s.str).join(" ");
                }
                
                // Mapped data for Srinath Goud
                document.getElementById('inSummary').value = "System Engineer with over two years of experience providing infrastructure support.";
                document.getElementById('inExp').value = "• Optimized network performance and integrated Cisco routers.\n• Deployed Windows/Mac OS and managed server environments.";
                document.getElementById('inEdu').value = "Master's, Computer Science - University Of The Pacific\nBachelor's, Computer Science - JPNCE";
                document.getElementById('inSkills').value = "Python, SQL, C++, React, Windows Server, Linux, Cisco, Salesforce";
                document.getElementById('inCerts').value = "• Cybersecurity from Cisco\n• Python from Cisco";
                
                update();
            };
            reader.readAsArrayBuffer(file);
        }

        // 2. Real-time Preview Update
        function update() {
            document.getElementById('outName').innerText = document.getElementById('inName').value || "Srinath Goud";
            document.getElementById('outSummary').innerText = document.getElementById('inSummary').value;
            document.getElementById('outExp').innerText = document.getElementById('inExp').value;
            document.getElementById('outEdu').innerText = document.getElementById('inEdu').value;
            document.getElementById('outSkills').innerText = document.getElementById('inSkills').value;
            document.getElementById('outCerts').innerText = document.getElementById('inCerts').value;
        }

        // 3. PDF Export
        function downloadPDF() {
            const element = document.getElementById('resume-template');
            element.style.transform = "scale(1)";
            html2pdf().from(element).set({
                margin: 0,
                filename: 'Srinath_Goud_Resume.pdf',
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).save().then(() => element.style.transform = "scale(0.75)");
        }
        
        // Initial run
        update();
    </script>
</body>
</html>
