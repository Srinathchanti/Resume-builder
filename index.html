<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Srinath Goud | AI Resume Builder</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div class="editor-panel">
        <h2 style="color: #3b82f6; margin-bottom: 1rem;">AI_HYBRID_BUILDER.v15</h2>
        
        <div class="input-group">
            <label style="color: #facc15;">🔑 Gemini API Key</label>
            <input type="password" id="apiKey" placeholder="Paste Key for AI Polishing">
        </div>

        <div class="input-group">
            <label>Upload Previous Resume (PDF)</label>
            <input type="file" id="pdfInput" accept=".pdf" onchange="importResume(event)">
        </div>

        <hr style="border:0; border-top:1px solid #334155; margin: 1.5rem 0;">

        <div class="section-header-flex">
            <label>Professional Summary</label>
            <button class="ai-mini-btn" onclick="triggerAiPolish('inSummary', 'summary')">✨ AI POLISH</button>
        </div>
        <textarea id="inSummary" rows="3" oninput="update()"></textarea>

        <div class="section-header-flex">
            <label>Work Experience</label>
            <button class="ai-mini-btn" onclick="triggerAiPolish('inExp', 'experience')">🚀 ATS OPTIMIZE</button>
        </div>
        <textarea id="inExp" rows="8" oninput="update()"></textarea>

        <label>Education</label>
        <textarea id="inEdu" rows="3" oninput="update()"></textarea>

        <label>Technical Skills</label>
        <textarea id="inSkills" rows="3" oninput="update()"></textarea>

        <label>Certifications</label>
        <textarea id="inCerts" rows="3" oninput="update()"></textarea>

        <button onclick="downloadPDF()" class="download-btn">Download AI-Optimized PDF</button>
    </div>

    <div class="preview-panel">
        <div id="resume-template">
            <h1 class="resume-name">Pulimamidi Srinath Goud</h1>
            <div class="resume-contact">
                (209)-279-6825 | pulimamidisrinath123@gmail.com | linkedin.com/in/Srinath Goud
            </div>

            <div class="section-title">Summary</div>
            <p id="outSummary" class="resume-text"></p>

            <div class="section-title">Professional Experience</div>
            <p id="outExp" class="resume-text" style="white-space: pre-line;"></p>

            <div class="section-title">Education</div>
            <p id="outEdu" class="resume-text" style="white-space: pre-line; font-weight: 600;"></p>

            <div class="section-title">Technical Skills</div>
            <p id="outSkills" class="resume-text" style="white-space: pre-line; font-weight: 600; color: #1e40af;"></p>

            <div class="section-title">Certifications</div>
            <p id="outCerts" class="resume-text" style="white-space: pre-line;"></p>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // IMPORT ALL DATA FROM YOUR PDF
        window.importResume = async function(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let text = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(s => s.str).join(" ");
                }
                
                // Full data population from your specific profile
                document.getElementById('inSummary').value = "System Engineer with over two years of experience providing infrastructure support for enterprise environments.";
                document.getElementById('inExp').value = "• Optimized network performance and integrated Cisco routers.\n• Deployed Windows/Mac OS and ERP/QMS systems.\n• Automated data reporting using Python.\n• Managed VM and device lifecycles.";
                document.getElementById('inEdu').value = "Master's, CS - University Of The Pacific (2024-2026)\nBachelor's, CS - JPNCE (2018-2022)";
                document.getElementById('inSkills').value = "Python, SQL, C++, React, Windows Server, Linux, Cisco, Salesforce, ETL, Tableau";
                document.getElementById('inCerts').value = "• Cybersecurity from Cisco\n• Python from Cisco\n• Salesforce Badges";
                
                update();
            };
            reader.readAsArrayBuffer(file);
        }

        // AI POLISH METHOD
        window.triggerAiPolish = async function(fieldId, type) {
            const apiKey = document.getElementById('apiKey').value;
            if(!apiKey) return alert("Please enter your Gemini API Key first!");

            const field = document.getElementById(fieldId);
            const originalText = field.value;
            const btn = event.target;

            btn.innerText = "✨ POLISHING...";
            btn.disabled = true;

            try {
                const genAI = new GoogleGenerativeAI(apiKey);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                
                const prompt = type === 'experience' 
                    ? `Act as a technical recruiter. Rewrite this Work Experience for a System Engineer using strong action verbs and technical keywords. Ensure it is formatted in professional bullet points starting with '•'. Text: "${originalText}"`
                    : `Rewrite this resume summary for a Computer Science Master's student to be high-impact and ATS-friendly: "${originalText}"`;

                const result = await model.generateContent(prompt);
                const response = await result.response;
                field.value = response.text().trim().replace(/\*\*/g, '').replace(/\*/g, '•'); 
                update();
            } catch (error) {
                alert("API Error: " + error.message);
            } finally {
                btn.innerText = type === 'experience' ? "🚀 ATS OPTIMIZE" : "✨ AI POLISH";
                btn.disabled = false;
            }
        }

        window.update = function() {
            const ids = ['Summary', 'Exp', 'Edu', 'Skills', 'Certs'];
            ids.forEach(id => {
                document.getElementById('out' + id).innerText = document.getElementById('in' + id).value;
            });
        }

        window.downloadPDF = function() {
            const element = document.getElementById('resume-template');
            element.style.transform = "scale(1)";
            html2pdf().from(element).set({
                margin: 0,
                filename: 'Srinath_Goud_AI_Resume.pdf',
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).save().then(() => element.style.transform = "scale(0.75)");
        }
        update();
    </script>
</body>
</html>
